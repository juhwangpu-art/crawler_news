name: Crawl and sync to Notion

# 외부 크론 (cron-job.org)이 매 30분 workflow_dispatch API를 호출한다.
# GitHub 자체 schedule은 신뢰성이 낮아서(지연·skip 잦음) 사용하지 않는다.
on:
  workflow_dispatch: {}   # 외부 크론 및 수동 실행 진입점

# 크론이 겹칠 때 이전 실행을 취소하지 말고 큐잉 (한 사이클씩 순차 실행)
concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crawl and sync to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_SUMMARY_PAGE_ID: ${{ secrets.NOTION_SUMMARY_PAGE_ID }}
        run: python run_headless.py
