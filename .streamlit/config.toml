[server]
# 사내망 접근을 위해 모든 인터페이스에 바인딩
address = "0.0.0.0"
port = 8501

# static/ 폴더 정적 파일 서빙 활성화
# 접근 경로: http://<host>:8501/app/static/<file>
enableStaticServing = true
headless = true

[browser]
gatherUsageStats = false

# 라이트 모드 강제 (사용자 시스템 다크모드 무시)
[theme]
base = "light"
primaryColor = "#c8206e"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f7f8fb"
textColor = "#202124"
font = "sans serif"
